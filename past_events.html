<!DOCTYPE html>

<head>

        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Outfit:wght@300;400;600&display=swap"

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

<body>
    <canvas id="starsCanvas"></canvas>

    <nav class="main-nav">

            <header>

                <div class="divider">
                    <span></span>
                    <div class="diamond"></div><span></span>

            <div class="content-block" style="padding-bottom: 250px;">
                <main class="talks-list" style="text-align: center; margin-top: 50px;">
                    <p style="color: var(--gold-dark); font-family: 'Outfit'; font-size: 1.2rem;">This is our first time

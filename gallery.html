<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis Mundi - Gallery</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>

<body>
    <canvas id="starsCanvas"></canvas>

    <nav class="main-nav">
        <a href="index.html">Upcoming Events</a>
        <a href="past_events.html">Past Events</a>
        <a href="gallery.html" class="active">Gallery</a>
    </nav>

    <div class="poster-container gallery-container">
        <div class="gallery-building">
            <div class="gallery-dome">
                <svg class="telescope-svg" viewBox="0 0 100 100" stroke-linejoin="round" fill="none">
                    <g class="scanning-telescope" style="transform-origin: 50px 85px;">
                        <!-- Layer 1: Opaque fills (establish solid background behind telescope) -->
                        <circle cx="50" cy="85" r="6" fill="var(--bg-color)" stroke="none" />
                        <path d="M 44 80 L 42 55 L 39 35 L 61 35 L 58 55 L 56 80 Z" fill="var(--bg-color)"
                            stroke="none" />
                        <path d="M 39 35 L 33 20 L 30 12 L 70 12 L 67 20 L 61 35 Z" fill="var(--bg-color)"
                            stroke="none" />

                        <!-- Layer 2: Darker detail lines (behind outlines) -->
                        <line x1="39" y1="35" x2="61" y2="35" stroke-width="1.5" stroke="var(--gold-dark)" />
                        <line x1="41" y1="50" x2="59" y2="50" stroke-width="1" stroke="var(--gold-dark)" />
                        <line x1="43" y1="65" x2="57" y2="65" stroke-width="1" stroke="var(--gold-dark)" />
                        <line x1="42" y1="48" x2="36" y2="38" stroke-width="1.5" stroke="var(--gold-dark)" />
                        <circle cx="35" cy="36" r="2.5" stroke="var(--gold-dark)" stroke-width="1.5" fill="none" />

                        <!-- Layer 3: Light structural outlines (drawn last = on top) -->
                        <circle cx="50" cy="85" r="6" fill="none" stroke="var(--gold-dark)" stroke-width="2" />
                        <path d="M 44 80 L 42 55 L 39 35 L 61 35 L 58 55 L 56 80 Z" fill="none"
                            stroke="var(--gold-light)" stroke-width="1.5" />
                        <path d="M 39 35 L 33 20 L 30 12 L 70 12 L 67 20 L 61 35" fill="none" stroke="var(--gold-light)"
                            stroke-width="1.5" />
                        <line x1="30" y1="12" x2="70" y2="12" stroke-width="2.5" stroke="var(--gold-dark)" />
                    </g>
                </svg>
                <div class="top-star" style="margin-bottom: 2px;">
                    <svg class="top-star-svg" viewBox="0 0 100 100" width="40" height="40" fill="none" stroke="none">
                        <path d="M50 0 Q50 45 100 50 Q50 55 50 100 Q50 55 0 50 Q50 45 50 0" fill="currentColor" />
                        <path d="M50 15 Q50 45 85 50 Q50 55 50 85 Q50 55 15 50 Q50 45 50 15" fill="currentColor"
                            transform="rotate(45 50 50)" />
                    </svg>
                </div>
                <header style="margin-top: 0; margin-bottom: 0;">
                    <h1 class="title">GALLERY</h1>
                    <div class="divider">
                        <span></span>
                        <div class="diamond"></div><span></span>
                    </div>
                </header>
            </div>


            <div class="gallery-body">
                <div class="gallery-date-section">
                    <h2 class="gallery-date">April 27, 2026</h2>
                    <p class="coming-soon">Coming soon!</p>
                    <!--
                    <div class="photo-grid">
                        <div class="photo-placeholder">Image<br>1</div>
                        <div class="photo-placeholder">Image<br>2</div>
                        <div class="photo-placeholder">Image<br>3</div>
                        <div class="photo-placeholder">Image<br>4</div>
                    </div>
                    -->
                </div>
            </div>
            <!-- Removed gallery-foundation completely -->
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
